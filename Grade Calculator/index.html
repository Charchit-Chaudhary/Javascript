<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Grade Calculator</h1>

    <input type="number" id="sub1" placeholder="Subject 1">

</body>
</html>
